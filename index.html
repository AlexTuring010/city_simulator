<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnowsWhere - Isometric Test</title>

  <!-- Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>

  <!-- Google Maps + Heatmap (visualization library REQUIRED) -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDzZ9oTB26apv6rPt4OTeyhBvNBv_RPmYw&libraries=visualization">
  </script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #222;
      overflow: hidden;
    }

    .layout {
      height: 50vh;           /* half screen height */
      margin: 48px;           /* gap from page edges */
      margin-top: 80px;       /* vertical offset */
      display: flex;
      gap: 64px;              /* larger gap between game and map */
      box-sizing: border-box;
    }

    #game-container,
    #map-wrap {
      flex: 1;
      position: relative;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    #map-wrap {
      padding: 0;
    }

    #map {
      position: absolute;
      inset: 0;          /* same as top/right/bottom/left: 0 */
      border-radius: 12px;
    }
  </style>
</head>

<body>
  <div class="layout">
    <div id="game-container"></div>

    <div id="map-wrap">
      <div id="map"></div>
    </div>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
