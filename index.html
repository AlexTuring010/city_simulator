<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crowdless — A/B Comparison</title>

  <!-- Phaser -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>

  <!-- Google Maps + Heatmap + Geometry (for meters-per-tile) -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDzZ9oTB26apv6rPt4OTeyhBvNBv_RPmYw&libraries=visualization,geometry">
  </script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #222;
      overflow-y: auto;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
    }

    .ab-container {
      padding: 24px 32px;
    }

    .sim-row {
      margin-bottom: 24px;
    }

    .row-label {
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 600;
      color: #ddd;
      letter-spacing: 0.5px;
    }

    .layout {
      height: 35vh;
      display: flex;
      gap: 32px;
      box-sizing: border-box;
    }

    .game-container,
    .map-wrap {
      flex: 1;
      position: relative;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 0 16px rgba(0,0,0,0.5);
    }

    .map-wrap {
      padding: 0;
    }

    .map-inner {
      position: absolute;
      inset: 0;
      border-radius: 12px;
    }

    /* HUD overlay */
    .hud {
      position: absolute;
      top: 8px;
      left: 10px;
      z-index: 9999;
      pointer-events: none;
      font-family: monospace;
      font-size: 16px;
      color: #fff;
      text-shadow:
        0 2px 0 #000,
        2px 0 0 #000,
        0 -2px 0 #000,
        -2px 0 0 #000;
    }

    /* Charts row */
    #charts-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 32px;
      padding-bottom: 40px;
    }

    .chart-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    .chart-card h4 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #aaa;
      text-align: center;
      font-weight: 500;
    }

    .chart-card canvas {
      width: 100% !important;
      height: 220px !important;
    }
  </style>
</head>

<body>
  <div class="ab-container">
    <!-- Baseline sim -->
    <div class="sim-row" id="row-baseline">
      <h3 class="row-label">Baseline — No App</h3>
      <div class="layout">
        <div class="game-container" id="game-container-A">
          <div class="hud">
            <div id="hud-npcs-A">NPCs: 0</div>
          </div>
        </div>
        <div class="map-wrap" id="map-wrap-A">
          <div class="map-inner" id="map-A"></div>
        </div>
      </div>
    </div>

    <!-- AI sim -->
    <div class="sim-row" id="row-ai">
      <h3 class="row-label">Crowdless AI — With App</h3>
      <div class="layout">
        <div class="game-container" id="game-container-B">
          <div class="hud">
            <div id="hud-npcs-B">NPCs: 0</div>
          </div>
        </div>
        <div class="map-wrap" id="map-wrap-B">
          <div class="map-inner" id="map-B"></div>
        </div>
      </div>
    </div>

    <!-- Comparison charts -->
    <div id="charts-row">
      <div class="chart-card"><h4>Walk Distance to Store</h4><canvas id="chart-walk-dist"></canvas></div>
      <div class="chart-card"><h4>Crowdedness at Arrival</h4><canvas id="chart-crowdedness"></canvas></div>
      <div class="chart-card"><h4>Queue Length at Arrival</h4><canvas id="chart-queue-len"></canvas></div>
      <div class="chart-card"><h4>Queue Abandonments</h4><canvas id="chart-abandonment"></canvas></div>
      <div class="chart-card"><h4>Customers Served / Store</h4><canvas id="chart-served"></canvas></div>
      <div class="chart-card"><h4>Bad Experience per User</h4><canvas id="chart-bad-exp"></canvas></div>
    </div>
  </div>

  <script type="module" src="src/game.js"></script>
</body>
</html>
